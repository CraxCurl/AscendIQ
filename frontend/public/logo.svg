<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1e1e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#cccccc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#888888;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background Shield/Circle -->
  <rect width="512" height="512" rx="128" fill="url(#grad1)" />
  <!-- Inner visual glow -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#glowGrad)" stroke-width="1.5" />
  
  <!-- Stylized "A" + Career Steps -->
  <g transform="translate(128, 110)">
    <!-- Right ascending step/bar of the A -->
    <path d="M160,0 L256,260 L190,260 L130,90 L70,260 L4,260 Z" fill="url(#grad2)" />
    <!-- Rising horizontal step connection -->
    <rect x="74" y="160" width="108" height="24" rx="6" fill="#ffffff" />
    <rect x="94" y="116" width="68" height="20" rx="5" fill="#e5e5e5" />
    <!-- Dynamic AI Sparkle at the apex of the A -->
    <path d="M160,-25 L165,-10 L180,-5 L165,0 L160,15 L155,0 L140,-5 L155,-10 Z" fill="#ffffff" />
  </g>
</svg>
